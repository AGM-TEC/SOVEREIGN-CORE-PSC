
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sovereign-c2-ingress
  namespace: tactical-edge
  annotations:
    kubernetes.io/ingress.class: "traefik" # Routeur standard K3s
spec:
  rules:
  - host: c2.sovereign.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sovereign-mesh-service
            port:
              number: 8080
